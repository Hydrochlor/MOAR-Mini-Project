datasets:
  transcripts:
    path: C:\Users\Hydrochloric\Desktop\mini-project\MOAR_4\medical_transcripts.json
    type: file
default_model: gpt-4o-mini
bypass_cache: true
optimizer_config:
  type: moar
  dataset_path: medical_transcripts.json
  save_dir: results/moar_optimization
  available_models:
  - gpt-4o-mini
  - gpt-4o
  - gpt-5-mini
  - gpt-5-nano
  evaluation_file: evaluate_medications.py
  metric_key: medication_extraction_score
  max_iterations: 20
  model: gpt-4o
system_prompt:
  dataset_description: a collection of transcripts of doctor visits
  persona: a medical practitioner analyzing patient symptoms and reactions to medications
operations:
- name: split_extract_medications
  type: split
  split_key: src
  method: token_count
  method_kwargs:
    num_tokens: 15000
    model: gpt-4o-mini
- name: gather_extract_medications
  type: gather
  content_key: src_chunk
  doc_id_key: split_extract_medications_id
  order_key: split_extract_medications_chunk_num
  peripheral_chunks:
    previous:
      head:
        count: 1
        content_key: src_chunk
      middle:
        content_key: src_chunk
      tail:
        count: 0
        content_key: src_chunk
    next:
      head:
        count: 0
        content_key: src_chunk
      middle:
        content_key: src_chunk
      tail:
        count: 1
        content_key: src_chunk
- name: map_extract_medications_chunks
  type: map
  prompt: 'You are analyzing a chunk of a larger document. Analyze the following transcript
    chunk:

    {{ input.src_chunk_rendered }}

    Extract and list all medications mentioned in this chunk.

    If no medications are mentioned, return an empty list.

    '
  model: gpt-4o-mini
  litellm_completion_kwargs:
    temperature: 0
  output:
    schema:
      medication: list[str]
- name: reduce_extract_medications
  type: reduce
  reduce_key: split_extract_medications_id
  prompt: 'Combine results from multiple document chunks: Extract and list all medications
    mentioned by processing each chunk result. Ensure all medications across chunks
    are captured without duplication: {% for input in inputs %}{{ input.medication
    | join(", ") }}{% if not loop.last %}, {% endif %}{% endfor %}.'
  model: gpt-4o-mini
  litellm_completion_kwargs:
    temperature: 0
  output:
    schema:
      medication: list[str]
  associative: false
  pass_through: true
pipeline:
  steps:
  - name: medication_extraction
    input: transcripts
    operations:
    - split_extract_medications
    - gather_extract_medications
    - map_extract_medications_chunks
    - reduce_extract_medications
  output:
    type: file
    path: C:\Users\Hydrochloric\Desktop\mini-project\MOAR_4\results\moar_optimization\pipeline_8.json

datasets:
  transcripts:
    path: C:\Users\Hydrochloric\Desktop\mini-project\MOAR_4\medical_transcripts.json
    type: file
default_model: gpt-4o
bypass_cache: true
optimizer_config:
  type: moar
  dataset_path: medical_transcripts.json
  save_dir: results/moar_optimization
  available_models:
  - gpt-4o-mini
  - gpt-4o
  - gpt-5-mini
  - gpt-5-nano
  evaluation_file: evaluate_medications.py
  metric_key: medication_extraction_score
  max_iterations: 20
  model: gpt-4o
system_prompt:
  dataset_description: a collection of transcripts of doctor visits
  persona: a medical practitioner analyzing patient symptoms and reactions to medications
operations:
- name: extract_medications
  type: map
  output:
    schema:
      medication: list[str]
  prompt: 'Analyze the following transcript of a conversation between a doctor and
    a patient:

    {{ input.src }}


    Extract and list all medications explicitly mentioned by name in the transcript
    (e.g., Tylenol, Synthroid), as well as those inferred through context (e.g., blood
    pressure medication, depression therapy medication). Pay attention to conversations
    involving ongoing medication adherence, adjustments, and any new prescriptions
    introduced during the dialogue. Include both generic and brand names. If no medications
    are mentioned or inferred, return an empty list.


    Consider medications in the context of treatment regimens discussed, patient adherence
    challenges, and any symptoms or conditions they are related to. If medications
    are implied (e.g., ''taking your immunosuppressive medications'' or ''blood pressure
    meds''), note them as they are intended in the treatment context.'
pipeline:
  steps:
  - name: medication_extraction
    input: transcripts
    operations:
    - extract_medications
  output:
    type: file
    path: C:\Users\Hydrochloric\Desktop\mini-project\MOAR_4\results\moar_optimization\pipeline_7.json

datasets:
  transcripts:
    path: C:\Users\Hydrochloric\Desktop\mini-project\MOAR_4\medical_transcripts.json
    type: file
default_model: gpt-4o-mini
bypass_cache: true
optimizer_config:
  type: moar
  dataset_path: medical_transcripts.json
  save_dir: results/moar_optimization
  available_models:
  - gpt-4o-mini
  - gpt-4o
  - gpt-5-mini
  - gpt-5-nano
  evaluation_file: evaluate_medications.py
  metric_key: medication_extraction_score
  max_iterations: 20
  model: gpt-4o
system_prompt:
  dataset_description: a collection of transcripts of doctor visits
  persona: a medical practitioner analyzing patient symptoms and reactions to medications
operations:
- name: fused_compress_medication_transcript_extract_medications
  prompt: 'Analyze the following transcript of a conversation between a doctor and
    a patient:

    {{ input.src }}

    Identify sections mentioning medication-related terms such as ''medication'',
    ''prescription'', ''drug'', ''pill'', ''tablet'', ''dose'', ''mg'', and extract
    and list all specific medications mentioned in these sections.

    If no medications are mentioned, return an empty list.'
  model: gpt-4o-mini
  litellm_completion_kwargs:
    temperature: 0
pipeline:
  steps:
  - name: medication_extraction
    input: transcripts
    operations:
    - fused_compress_medication_transcript_extract_medications
  output:
    type: file
    path: C:\Users\Hydrochloric\Desktop\mini-project\MOAR_4\results\moar_optimization\pipeline_20.json

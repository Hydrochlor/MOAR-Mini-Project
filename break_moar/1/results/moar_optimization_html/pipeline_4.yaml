datasets:
  html_docs:
    path: C:\Users\Hydrochloric\Desktop\mini-project\reproduce_moar_2\html_data.json
    type: file
default_model: gpt-4o-mini
bypass_cache: true
optimizer_config:
  type: moar
  dataset_path: html_data.json
  save_dir: results/moar_optimization_html
  available_models:
  - gpt-4o-mini
  - gpt-4o
  - gpt-5-mini
  evaluation_file: evaluate_html.py
  metric_key: html_clean_score
  max_iterations: 15
  model: gpt-4o
system_prompt:
  dataset_description: A dataset containing text scraped from web pages, mixed with
    HTML tags.
  persona: A data engineer cleaning text data for natural language processing.
operations:
- name: summarize_html_content
  type: map
  prompt: 'Summarize the main textual content from the following HTML snippet while
    removing all HTML tags and preserving key information necessary for cleaning text
    purposes. Extract any potentially valuable text but strip away unnecessary HTML
    structure and metadata, ensuring that all substantive text is plain and informative:
    {{ input.raw_html }}'
  model: gpt-4o-mini
  litellm_completion_kwargs:
    temperature: 0
  output:
    schema:
      raw_html: string
- name: strip_html
  type: map
  output:
    schema:
      clean_text: str
  prompt: 'Extract the plain text from the following HTML content by removing all
    HTML tags.

    Do not add any extra commentary, just return the cleaned text.


    HTML content:

    {{ input.raw_html }}

    '
pipeline:
  steps:
  - name: clean_web_data
    input: html_docs
    operations:
    - summarize_html_content
    - strip_html
  output:
    type: file
    path: C:\Users\Hydrochloric\Desktop\mini-project\reproduce_moar_2\results\moar_optimization_html\pipeline_4.json

datasets:
  html_docs:
    path: C:\Users\Hydrochloric\Desktop\mini-project\reproduce_moar_2\html_data.json
    type: file
default_model: gpt-4o-mini
bypass_cache: true
optimizer_config:
  type: moar
  dataset_path: html_data.json
  save_dir: results/moar_optimization_html
  available_models:
  - gpt-4o-mini
  - gpt-4o
  - gpt-5-mini
  evaluation_file: evaluate_html.py
  metric_key: html_clean_score
  max_iterations: 15
  model: gpt-4o
system_prompt:
  dataset_description: A dataset containing text scraped from web pages, mixed with
    HTML tags.
  persona: A data engineer cleaning text data for natural language processing.
operations:
- name: html_strong_heading_extraction
  type: code_map
  code: "def transform(input_doc):\n    import re\n    \n    raw_html = input_doc.get('raw_html',\
    \ '')\n    \n    # Define patterns for extracting key HTML elements relevant for\
    \ compression\n    keyword_patterns = [\n        r'<(?:strong|b)>(.*?)</(?:strong|b)>',\
    \  # Strong or bold text\n        r'<h[1-3]>(.*?)</h[1-3]>',  # Headings\n   \
    \     r'<p>(.*?)</p>',  # Paragraphs\n        r'<div.*?>(.*?)</div>',  # Div containers\n\
    \        r'<li>(.*?)</li>'  # List items\n    ]\n\n    relevant_spans = []\n\n\
    \    # Find all matches for the patterns\n    for pattern in keyword_patterns:\n\
    \        matches = re.finditer(pattern, raw_html, re.DOTALL | re.IGNORECASE)\n\
    \        for match in matches:\n            context_start = max(0, match.start()\
    \ - 200)\n            context_end = min(len(raw_html), match.end() + 200)\n\n\
    \            # Extract the context around the match\n            context = raw_html[context_start:context_end].strip()\n\
    \            relevant_spans.append((context_start, context_end, context))\n\n\
    \    # Merge overlapping spans to avoid duplication\n    if relevant_spans:\n\
    \        relevant_spans.sort(key=lambda x: x[0])\n        merged_spans = [relevant_spans[0]]\n\
    \n        for current_start, current_end, current_text in relevant_spans[1:]:\n\
    \            last_start, last_end, last_text = merged_spans[-1]\n\n          \
    \  if current_start <= last_end + 50:  # Adjust overlapping threshold as needed\n\
    \                # Extend the last span\n                new_end = max(last_end,\
    \ current_end)\n                new_text = raw_html[last_start:new_end]\n    \
    \            merged_spans[-1] = (last_start, new_end, new_text)\n            else:\n\
    \                merged_spans.append((current_start, current_end, current_text))\n\
    \        \n        # Compile the compressed text\n        compressed_text = '\\\
    n\\n--- SECTION BREAK ---\\n\\n'.join([span[2] for _, _, span in merged_spans])\n\
    \    else:\n        compressed_text = raw_html  # Fallback if no matches\n\n \
    \   return {\n        'raw_html': compressed_text\n    }\n"
- name: strip_html
  type: map
  output:
    schema:
      clean_text: str
  prompt: 'Extract the plain text from the following HTML content by removing all
    HTML tags.

    Do not add any extra commentary, just return the cleaned text.


    HTML content:

    {{ input.raw_html }}

    '
pipeline:
  steps:
  - name: clean_web_data
    input: html_docs
    operations:
    - html_strong_heading_extraction
    - strip_html
  output:
    type: file
    path: C:\Users\Hydrochloric\Desktop\mini-project\reproduce_moar_2\results\moar_optimization_html\pipeline_6.json

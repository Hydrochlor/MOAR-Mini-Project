datasets:
  html_docs:
    path: C:\Users\Hydrochloric\Desktop\mini-project\reproduce_moar_2\html_data.json
    type: file
default_model: gpt-4o-mini
bypass_cache: true
optimizer_config:
  type: moar
  dataset_path: html_data.json
  save_dir: results/moar_optimization_html
  available_models:
  - gpt-4o-mini
  - gpt-4o
  - gpt-5-mini
  evaluation_file: evaluate_html.py
  metric_key: html_clean_score
  max_iterations: 15
  model: gpt-4o
system_prompt:
  dataset_description: A dataset containing text scraped from web pages, mixed with
    HTML tags.
  persona: A data engineer cleaning text data for natural language processing.
operations:
- name: fused_summarize_html_content_strip_html
  prompt: 'Process the following HTML content to first summarize the main textual
    content while removing all HTML tags and then extract the plain text from the
    summarized content, ensuring that all valuable information is preserved and provided
    in a clean format. HTML content: {{ input.raw_html }}'
  model: gpt-4o-mini
  litellm_completion_kwargs:
    temperature: 0
  type: map
  output:
    schema:
      raw_html: string
      clean_text: str
pipeline:
  steps:
  - name: clean_web_data
    input: html_docs
    operations:
    - fused_summarize_html_content_strip_html
  output:
    type: file
    path: C:\Users\Hydrochloric\Desktop\mini-project\reproduce_moar_2\results\moar_optimization_html\pipeline_12.json

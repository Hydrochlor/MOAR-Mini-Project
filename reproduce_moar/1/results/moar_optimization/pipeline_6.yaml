datasets:
  logs:
    path: C:\Users\Hydrochloric\Desktop\mini-project\MOAR_4\server_logs.json
    type: file
default_model: gpt-4o-mini
bypass_cache: true
optimizer_config:
  type: moar
  dataset_path: server_logs.json
  save_dir: results/moar_optimization
  available_models:
  - gpt-4o-mini
  - gpt-4o
  - gpt-5-mini
  evaluation_file: evaluate_logs.py
  metric_key: ip_extraction_score
  max_iterations: 15
  model: gpt-4o
system_prompt:
  dataset_description: a collection of server logs
  persona: a system administrator extracting network information
operations:
- name: extract_ip
  type: map
  output:
    schema:
      ip_address: list[str]
  prompt: 'Extract all IPv4 addresses from the server log message provided below.
    The log entries contain the IPv4 addresses enclosed within square brackets following
    a timestamp and log level indicator. For example, in ''[152.0.236.114]'', ''152.0.236.114''
    is the target IP address. Only extract IPv4 addresses, and if no such addresses
    are present, return an empty list.


    {{ input.log }}'
pipeline:
  steps:
  - name: parse_logs
    input: logs
    operations:
    - extract_ip
  output:
    type: file
    path: C:\Users\Hydrochloric\Desktop\mini-project\MOAR_4\results\moar_optimization\pipeline_6.json

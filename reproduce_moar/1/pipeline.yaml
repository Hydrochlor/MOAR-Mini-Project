datasets:
  logs:
    path: server_logs.json
    type: file

default_model: gpt-4o-mini
bypass_cache: true

optimizer_config:
  type: moar
  dataset_path: server_logs.json
  save_dir: results/moar_optimization
  available_models: 
    # - openrouter/openai/gpt-4o-mini
    # - gpt-5-nano
    - gpt-4o-mini
    - gpt-4o
    - gpt-5-mini
    
  evaluation_file: evaluate_logs.py
  metric_key: ip_extraction_score
  max_iterations: 15
  model: gpt-4o

system_prompt:
  dataset_description: a collection of server logs
  persona: a system administrator extracting network information

operations:
  - name: extract_ip
    type: map
    output:
      schema:
        ip_address: list[str]
    prompt: |
      Analyze the following server log entry:
      {{ input.log }}
      Extract all IPv4 addresses from the log message.
      If no IP addresses are found, return an empty list.

pipeline:
  steps:
    - name: parse_logs
      input: logs
      operations:
        - extract_ip
  output:
    type: file
    path: extracted_ips_results.json
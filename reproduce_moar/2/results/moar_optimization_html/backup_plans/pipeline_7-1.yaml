datasets:
  html_docs:
    path: C:\Users\Hydrochloric\Desktop\mini-project\reproduce_moar_2\html_data.json
    type: file
default_model: gpt-4o-mini
bypass_cache: true
optimizer_config:
  type: moar
  dataset_path: html_data.json
  save_dir: results/moar_optimization_html
  available_models:
  - gpt-4o-mini
  - gpt-4o
  - gpt-5-mini
  evaluation_file: evaluate_html.py
  metric_key: html_clean_score
  max_iterations: 15
  model: gpt-4o
system_prompt:
  dataset_description: A dataset containing text scraped from web pages, mixed with
    HTML tags.
  persona: A data engineer cleaning text data for natural language processing.
operations:
- name: strip_html
  type: map
  output:
    schema:
      clean_text: str
  prompt: 'Extract the plain text from the given HTML content by removing all HTML
    tags. When removing tags:

    - Replace each HTML tag with a single space ('' '') to separate words appropriately
    without merging them (for instance, in sequences like "/><").

    - Ensure that text content within structural tags like <p>, <ul>, <li>, <blockquote>,
    and <cite> retains its logical separation – e.g., <li> tags should be separated
    by spaces.

    - Text from decorative or metadata tags such as <img>, <figure>, and <figcaption>
    should be removed entirely unless explicitly cited text like the one in <cite>
    is necessary.

    - Retain text from <strong> or <span> tags that indicate emphasis, while ignoring
    attributes unless necessary for reading clarity.

    Do not add any extra commentary; return the cleaned text as is.


    HTML content:

    {{ input.raw_html }}

    '
pipeline:
  steps:
  - name: clean_web_data
    input: html_docs
    operations:
    - strip_html
  output:
    type: file
    path: C:\Users\Hydrochloric\Desktop\mini-project\reproduce_moar_2\results\moar_optimization_html\pipeline_1-1-acc.json

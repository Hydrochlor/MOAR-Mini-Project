datasets:
  html_docs:
    path: C:\Users\Hydrochloric\Desktop\mini-project\reproduce_moar_2\html_data.json
    type: file
default_model: gpt-4o-mini
bypass_cache: true
optimizer_config:
  type: moar
  dataset_path: html_data.json
  save_dir: results/moar_optimization_html
  available_models:
  - gpt-4o-mini
  - gpt-4o
  - gpt-5-mini
  evaluation_file: evaluate_html.py
  metric_key: html_clean_score
  max_iterations: 15
  model: gpt-4o
system_prompt:
  dataset_description: A dataset containing text scraped from web pages, mixed with
    HTML tags.
  persona: A data engineer cleaning text data for natural language processing.
operations:
- name: remove_html_tags
  type: map
  prompt: 'Process the following HTML content by removing all HTML tags and replacing
    them with a single space to ensure words do not merge.

    HTML content: {{ input.raw_html }}

    Return the text with HTML tags removed, maintaining the original spacing structure
    between text elements but removing tags completely.'
  model: gpt-4o-mini
  litellm_completion_kwargs:
    temperature: 0
  output:
    schema:
      text_without_tags: string
- name: normalize_spacing
  type: map
  prompt: 'Normalize the spacing in the provided text to ensure sentences and words
    are correctly separated without extra spaces or merging.

    Text without tags: {{ input.text_without_tags }}

    Return the text with normalized spacing.'
  model: gpt-4o-mini
  litellm_completion_kwargs:
    temperature: 0
  output:
    schema:
      clean_text: str
pipeline:
  steps:
  - name: clean_web_data
    input: html_docs
    operations:
    - remove_html_tags
    - normalize_spacing
  output:
    type: file
    path: C:\Users\Hydrochloric\Desktop\mini-project\reproduce_moar_2\results\moar_optimization_html\pipeline_17.json

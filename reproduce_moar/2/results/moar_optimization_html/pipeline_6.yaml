datasets:
  html_docs:
    path: C:\Users\Hydrochloric\Desktop\mini-project\reproduce_moar_2\html_data.json
    type: file
default_model: gpt-4o-mini
bypass_cache: true
optimizer_config:
  type: moar
  dataset_path: html_data.json
  save_dir: results/moar_optimization_html
  available_models:
  - gpt-4o-mini
  - gpt-4o
  - gpt-5-mini
  evaluation_file: evaluate_html.py
  metric_key: html_clean_score
  max_iterations: 15
  model: gpt-4o
system_prompt:
  dataset_description: A dataset containing text scraped from web pages, mixed with
    HTML tags.
  persona: A data engineer cleaning text data for natural language processing.
operations:
- name: summarize_html_content
  type: map
  prompt: 'Summarize the content from this HTML document by removing all HTML tags,
    replacing them with spaces to avoid merged words, and preserving the main textual
    information. Keep the key phrases and data intact while ensuring clarity and readability:
    {{ input.raw_html }}'
  model: gpt-4o-mini
  litellm_completion_kwargs:
    temperature: 0
  output:
    schema:
      raw_html: string
- name: strip_html
  type: map
  output:
    schema:
      clean_text: str
  prompt: 'Extract the plain text from the following HTML content by removing all
    HTML tags.

    When removing tags, replace them with a single space ('' '') to prevent adjacent
    words from merging together (e.g., preventing "</div><div>" from causing word
    smashing).

    Do not add any extra commentary, just return the cleaned text.


    HTML content:

    {{ input.raw_html }}

    '
pipeline:
  steps:
  - name: clean_web_data
    input: html_docs
    operations:
    - summarize_html_content
    - strip_html
  output:
    type: file
    path: C:\Users\Hydrochloric\Desktop\mini-project\reproduce_moar_2\results\moar_optimization_html\pipeline_6.json

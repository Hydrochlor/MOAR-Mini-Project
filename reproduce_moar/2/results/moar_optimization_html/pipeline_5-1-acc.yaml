datasets:
  html_docs:
    path: C:\Users\Hydrochloric\Desktop\mini-project\reproduce_moar_2\html_data.json
    type: file
default_model: gpt-4o-mini
bypass_cache: true
optimizer_config:
  type: moar
  dataset_path: html_data.json
  save_dir: results/moar_optimization_html
  available_models:
  - gpt-4o-mini
  - gpt-4o
  - gpt-5-mini
  evaluation_file: evaluate_html.py
  metric_key: html_clean_score
  max_iterations: 15
  model: gpt-4o
system_prompt:
  dataset_description: A dataset containing text scraped from web pages, mixed with
    HTML tags.
  persona: A data engineer cleaning text data for natural language processing.
operations:
- name: truncate_html_content
  type: code_map
  code: "def transform(input_doc):\n    raw_html_content = input_doc.get('raw_html',\
    \ '')\n    words = raw_html_content.split()\n\n    if len(words) <= 100:\n   \
    \     # Document is short enough, keep as is\n        truncated = raw_html_content\n\
    \    else:\n        head = ' '.join(words[:100])\n        if 0 > 0:\n        \
    \    tail = ' '.join(words[-0:])\n            truncated = head + ' ... ' + tail\n\
    \        else:\n            truncated = head\n\n    return {'raw_html': truncated}"
- name: strip_html
  type: map
  output:
    schema:
      clean_text: str
  prompt: 'Extract the plain text content from the provided HTML by removing all tags
    and replacing each with a single space to prevent merging of adjacent words, including
    those that appear in block-level and inline tags. Maintain the content order regardless
    of tag structure, ensuring no special text formatting (like bold or italics) is
    retained. Support cases with repeated structures such as lists. Do not interpret
    or add any extra commentary; solely return the clean text as is without line breaks.


    HTML content:

    {{ input.raw_html }}

    '
pipeline:
  steps:
  - name: clean_web_data
    input: html_docs
    operations:
    - truncate_html_content
    - strip_html
  output:
    type: file
    path: C:\Users\Hydrochloric\Desktop\mini-project\reproduce_moar_2\results\moar_optimization_html\pipeline_11.json

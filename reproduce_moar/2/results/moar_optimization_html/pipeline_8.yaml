datasets:
  html_docs:
    path: C:\Users\Hydrochloric\Desktop\mini-project\reproduce_moar_2\html_data.json
    type: file
default_model: gpt-4o-mini
bypass_cache: true
optimizer_config:
  type: moar
  dataset_path: html_data.json
  save_dir: results/moar_optimization_html
  available_models:
  - gpt-4o-mini
  - gpt-4o
  - gpt-5-mini
  evaluation_file: evaluate_html.py
  metric_key: html_clean_score
  max_iterations: 15
  model: gpt-4o
system_prompt:
  dataset_description: A dataset containing text scraped from web pages, mixed with
    HTML tags.
  persona: A data engineer cleaning text data for natural language processing.
operations:
- name: split_strip_html
  type: split
  split_key: raw_html
  method: token_count
  method_kwargs:
    num_tokens: 12000
    model: gpt-4o-mini
- name: gather_strip_html
  type: gather
  content_key: raw_html_chunk
  doc_id_key: split_strip_html_id
  order_key: split_strip_html_chunk_num
  peripheral_chunks:
    previous:
      head:
        count: 1
        content_key: raw_html_chunk
      middle:
        content_key: summary_content
      tail:
        count: 0
        content_key: raw_html_chunk
    next:
      head:
        count: 0
        content_key: raw_html_chunk
      middle:
        content_key: summary_content
      tail:
        count: 1
        content_key: raw_html_chunk
- name: map_strip_html_chunks
  type: map
  prompt: 'You are analyzing a chunk of a larger document. Extract the meaningful
    plain text from the provided HTML content by removing all HTML tags, preserving
    necessary spaces to avoid word concatenation. Focus on retaining human-readable
    content while ignoring media links, image tags, or style attributes, but include
    any accompanying captions or visible text such as list items and bold text. When
    replacing HTML tags, ensure single spaces ('' '') are inserted appropriately so
    that any consecutive block-level tags (e.g., div, p, li) do not merge.

    Return only the cleaned text without additional commentary.


    HTML content:

    {{ input.raw_html_chunk_rendered }}'
  model: gpt-4o-mini
  litellm_completion_kwargs:
    temperature: 0
  output:
    schema:
      clean_text: str
- name: reduce_strip_html
  type: reduce
  reduce_key: split_strip_html_id
  prompt: 'Combine results from multiple document chunks: Extract the meaningful plain
    text by combining the results from each chunk. {% for input in inputs %}{{ input.clean_text
    }}{% if not loop.last %} {% endif %}{% endfor %} Return only the cleaned text
    without additional commentary.'
  model: gpt-4o-mini
  litellm_completion_kwargs:
    temperature: 0
  output:
    schema:
      clean_text: str
  associative: false
  pass_through: true
pipeline:
  steps:
  - name: clean_web_data
    input: html_docs
    operations:
    - split_strip_html
    - gather_strip_html
    - map_strip_html_chunks
    - reduce_strip_html
  output:
    type: file
    path: C:\Users\Hydrochloric\Desktop\mini-project\reproduce_moar_2\results\moar_optimization_html\pipeline_8.json
